<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#1e3a5f" />
  <title>Kongshaug – Elevapp</title>
  <link rel="manifest" href="/app/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/styles.css" />
  <!-- QR-skanner -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { background: var(--surface); }
    #root { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column;
      background: var(--surface); position: relative; }
    .screen { flex: 1; display: flex; flex-direction: column; padding: env(safe-area-inset-top) 0 0; }
    .pad { padding: 20px 22px; }
    .topbar { display: flex; align-items: center; gap: 8px; padding: 14px 18px 4px; }
    .topbar svg { width: 24px; height: 24px; }
    .h1 { font-size: 25px; font-weight: 800; letter-spacing: -.02em; line-height: 1.15; }
    .sub { font-size: 14px; color: var(--muted); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 20px;
      box-shadow: 0 1px 3px rgba(16,24,40,.04); }
    .tabbar { display: flex; justify-content: space-around; align-items: center; padding: 10px 8px calc(12px + env(safe-area-inset-bottom));
      background: #fff; border-top: 1px solid var(--line); position: sticky; bottom: 0; }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #9aa3b2;
      background: none; border: none; font-size: 11px; font-weight: 600; padding: 4px 10px; }
    .tab svg { width: 23px; height: 23px; }
    .tab.active { color: var(--navy); font-weight: 700; }
    .banner { display: flex; align-items: center; gap: 9px; padding: 11px 14px; border-radius: 12px;
      font-size: 13px; font-weight: 700; }
    .banner svg { width: 16px; height: 16px; flex: 0 0 auto; }
    .toast { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
      background: #1a2230; color: #fff; padding: 12px 18px; border-radius: 12px; font-size: 14px;
      font-weight: 600; z-index: 50; max-width: 90%; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/app/app.js"></script>
</body>
</html>
